name: Weekly data refresh

# Re-fetches every active ISP's Broadband Facts file, normalizes it, rebuilds
# the site, archives a dated snapshot, and commits the result back to the repo.
# The repo IS the database; each weekly commit is the pricing history.

on:
  schedule:
    - cron: "17 9 * * 1" # Mondays 09:17 UTC
  workflow_dispatch: {} # allows a manual "Run workflow" click

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch + normalize + build site
        run: |
          node scripts/fetch.mjs || echo "fetch had failures (handled; stale copies kept)"
          node scripts/normalize.mjs
          node scripts/build-site.mjs

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "Weekly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
